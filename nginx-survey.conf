# survey-web Nginx 配置
# 放置路径：/etc/nginx/sites-available/survey-web
# 启用：ln -s /etc/nginx/sites-available/survey-web /etc/nginx/sites-enabled/
#
# 步骤：
#  1. 将 server_name 改为你的域名或服务器内网 IP
#  2. 如需 HTTPS（飞书 OAuth 必须），运行：
#     sudo apt install certbot python3-certbot-nginx
#     sudo certbot --nginx -d survey.yourdomain.com
#  3. sudo nginx -t && sudo systemctl reload nginx

upstream survey_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name survey.yourdomain.com;  # ← 改成你的域名 或 服务器 IP

    # 上传文件大小限制（最大 50MB）
    client_max_body_size 55M;

    # ── SSE 流式传输（题型识别 / 方案 / 报告生成）──
    location ~ ^/api/(columns|plan|report)/ {
        proxy_pass http://survey_app;
        proxy_http_version 1.1;
        proxy_set_header Connection '';          # 关闭 keep-alive 复用，避免 SSE 被缓冲
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;                     # 禁用缓冲，SSE 实时推送必须
        proxy_cache off;
        proxy_read_timeout 600s;                 # AI 生成最长 10 分钟
        proxy_send_timeout 600s;

        # 让浏览器不要缓存 SSE 响应
        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }

    # ── 其余 API（上传、导出、飞书 OAuth 等）──
    location /api/ {
        proxy_pass http://survey_app;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # ── 静态文件（直接由 Nginx 提供，减轻 Python 进程压力）──
    location /static/ {
        alias /opt/survey-web/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── 前端页面 ──
    location / {
        proxy_pass http://survey_app;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
